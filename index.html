<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="flex flex-col  items-center">
    <!-- main container -->
    <h1 class="my-15 text-6xl">Calculator</h1>

    <div class="max-w-lg bg-gray-400 p-5 text-3xl rounded-lg">
      <!-- calculator container -->
      <div class="flex  gap-10  flex-col ">
        <!-- text input container -->
        <div class="">
          <input class="bg-white rounded-lg p-1 text-3xl" type="text" name="" placeholder="0" id="" />
        </div>
        <!-- input buttons container -->
        <div class="grid grid-cols-4 gap-5 items">
          <div class="flex justify-center items-center bg-gray-700 p-2 rounded-lg aspect-square">7</div>
          <div class="flex justify-center items-center bg-gray-700 p-2 rounded-lg aspect-square">8</div>
          <div class="flex justify-center items-center bg-gray-700 p-2 rounded-lg aspect-square">9</div>
          <div class="flex justify-center items-center bg-amber-400 p-2 rounded-lg aspect-square">*</div>
          <div class="flex justify-center items-center bg-gray-700 p-2 rounded-lg aspect-square">4</div>
          <div class="flex justify-center items-center bg-gray-700 p-2 rounded-lg aspect-square">5</div>
          <div class="flex justify-center items-center bg-gray-700 p-2 rounded-lg aspect-square">6</div>
          <div class="flex justify-center items-center bg-amber-400 p-2 rounded-lg aspect-square">/</div>
          <div class="flex justify-center items-center bg-gray-700 p-2 rounded-lg aspect-square">1</div>
          <div class="flex justify-center items-center bg-gray-700 p-2 rounded-lg aspect-square">2</div>
          <div class="flex justify-center items-center bg-gray-700 p-2 rounded-lg aspect-square">3</div>
          <div class="flex justify-center items-center bg-amber-400 p-2 rounded-lg aspect-square">-</div>
          <div class="col-span-2 flex justify-center items-center bg-gray-700 p-2 rounded-lg ">0</div>
          <div class="flex justify-center items-center bg-gray-700 p-2 rounded-lg aspect-square">.</div>
          <div class="flex justify-center items-center bg-amber-400 p-2 rounded-lg aspect-square">+</div>
          <div class="flex justify-center items-center bg-amber-400 p-2 rounded-lg aspect-square">AC</div>
          <div class="col-span-2 flex justify-center items-center bg-amber-400 p-2 rounded-lg">C</div>
          <div class="flex justify-center items-center bg-amber-400 p-2 rounded-lg aspect-square">=</div>
        </div>
      </div>
    </div>
  </body>
</html>
